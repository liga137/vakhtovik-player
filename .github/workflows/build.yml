name: Build Flutter Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Download sing-box.exe
        shell: pwsh
        run: |
          $url = "https://github.com/SagerNet/sing-box/releases/download/v1.13.12/sing-box-1.13.12-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\sing-box.zip"
          Expand-Archive -Path "$env:RUNNER_TEMP\sing-box.zip" -DestinationPath "$env:RUNNER_TEMP\sing-box" -Force
          $extracted = Get-ChildItem "$env:RUNNER_TEMP\sing-box" -Directory | Select-Object -First 1
          Copy-Item "$($extracted.FullName)\sing-box.exe" windows\ -Force
          Copy-Item "$($extracted.FullName)\libcronet.dll" windows\ -Force

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Vakhtovik-Player-Windows.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: Vakhtovik-Player-Windows.zip
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: release-assets/android

      - name: Rename APK
        shell: bash
        run: mv release-assets/android/app-release.apk release-assets/android/Vakhtovik-Player-Android.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Vakhtovik Player v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          body: |
            Автоматическая сборка Плеера Вахтовика.

            v${{ steps.version.outputs.version }}:
            - YouTube «Главная» через InnerTube API
            - IPTV: Беларусь + Россия, кэш-first
            - WebView: исправлены циклические перезагрузки
            - Исправлены YouTube search/feed/popular
          files: |
            release-assets/windows/Vakhtovik-Player-Windows.zip
            release-assets/android/Vakhtovik-Player-Android.apk
