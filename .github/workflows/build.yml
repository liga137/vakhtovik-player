name: Build Flutter Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          choco install flutter --version=3.24.3 -y --no-progress --limit-output
          refreshenv
        shell: pwsh

      - name: Flutter doctor & config
        run: |
          $env:Path = "C:\tools\flutter\bin;$env:Path"
          flutter doctor
          flutter config --enable-windows-desktop
        shell: pwsh

      - name: Install Flutter dependencies
        run: |
          $env:Path = "C:\tools\flutter\bin;$env:Path"
          flutter pub get
        shell: pwsh

      - name: Build Windows Release
        run: |
          $env:Path = "C:\tools\flutter\bin;$env:Path"
          flutter build windows --release

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Vakhtovik-Player-Windows.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: Vakhtovik-Player-Windows.zip
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Flutter SDK
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.3-stable.tar.xz
          tar xf flutter_linux_3.24.3-stable.tar.xz
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: release-assets/android

      - name: Rename APK
        shell: bash
        run: mv release-assets/android/app-release.apk release-assets/android/Vakhtovik-Player-Android.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Vakhtovik Player v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          body: |
            Автоматическая сборка Плеера Вахтовика.

            Изменения:
            - встроенный VPN полностью удалён из приложения и сборки;
            - добавлен раздел IPTV с категориями и запуском через серверное сжатие;
            - Windows и Android артефакты приложены ниже.
          files: |
            release-assets/windows/Vakhtovik-Player-Windows.zip
            release-assets/android/Vakhtovik-Player-Android.apk
