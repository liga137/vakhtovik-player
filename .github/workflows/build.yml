name: Build VakhtovikPlayer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Download sing-box
        shell: pwsh
        run: |
          $version = "1.13.12"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$version/sing-box-$version-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile sing-box.zip
          Expand-Archive sing-box.zip -DestinationPath sb -Force
          $exe = Get-ChildItem -Recurse sb -Filter "sing-box.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "build\windows\x64\runner\Release\sing-box.exe"
          Write-Host "sing-box.exe copied"

      - name: Package
        shell: pwsh
        run: |
          $v = ((Get-Content pubspec.yaml | Select-String '^version:') -split ':\s+')[1] -replace '\+.*$',''
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath "VakhtovikPlayer-v$v-windows.zip" -Force

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: VakhtovikPlayer-*-windows.zip
          retention-days: 30

  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Download sing-box Android library
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a android/app/src/main/jniLibs/armeabi-v7a android/app/src/main/jniLibs/x86_64
          mkdir -p android/app/libs
          # Скачиваем SFA APK и извлекаем libbox.so
          curl -L -o sfa.apk https://github.com/SagerNet/sing-box/releases/download/v1.11.7/SFA-1.11.7-universal.apk
          unzip -o sfa.apk -d sfa_extracted
          cp sfa_extracted/lib/arm64-v8a/libbox.so android/app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || true
          cp sfa_extracted/lib/armeabi-v7a/libbox.so android/app/src/main/jniLibs/armeabi-v7a/ 2>/dev/null || true
          cp sfa_extracted/lib/x86_64/libbox.so android/app/src/main/jniLibs/x86_64/ 2>/dev/null || true
          # Также пробуем извлечь classes.jar (может не быть)
          unzip -o sfa.apk classes.dex -d sfa_classes 2>/dev/null || true
          ls -la android/app/src/main/jniLibs/*/
          echo "libbox.so added"

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  release:
    name: Release
    needs: [build-windows, build-android]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: ver
        shell: bash
        run: |
          V=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Download Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: assets/

      - name: Download Android
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Vakhtovik Player v${{ steps.ver.outputs.version }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          files: assets/**
