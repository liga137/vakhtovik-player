name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 27 (required for media_kit C++ engine)
        run: sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_SDK_ROOT

      - name: Setup Flutter 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/27.0.12077973

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
