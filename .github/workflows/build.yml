name: Build Flutter Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Download GOST tunnel (Windows)
        run: |
          curl -L -o gost.zip https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_windows_amd64.zip
          Expand-Archive -Force gost.zip -DestinationPath .
          mkdir -Force build\windows\x64\runner\Release

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Bundle GOST with Windows build
        run: Copy-Item gost.exe build\windows\x64\runner\Release\gost.exe

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Vakhtovik-Player-Windows.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: Vakhtovik-Player-Windows.zip
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter 3.24.3
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
