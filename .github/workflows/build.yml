name: Build VakhtovikPlayer

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────
  # Сборка под Windows (EXE / MSIX)
  # ─────────────────────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client/flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      - name: Build Windows Release
        run: flutter build windows --release

      # Скачиваем sing-box.exe (VPN) для включения в сборку
      - name: Download sing-box for Windows
        shell: pwsh
        run: |
          $version = "1.13.12"
          $url = "https://github.com/SagerNet/sing-box/releases/download/v$version/sing-box-$version-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile sing-box.zip
          Expand-Archive sing-box.zip -DestinationPath sing-box-extracted -Force
          $exe = Get-ChildItem -Recurse sing-box-extracted -Filter "sing-box.exe" | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "build\windows\x64\runner\Release\sing-box.exe"
            Write-Host "sing-box.exe copied to release dir"
          } else {
            Write-Warning "sing-box.exe not found in archive"
          }

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $version = "0.2.22"
          $relDir = "build\windows\x64\runner\Release"
          Compress-Archive -Path "$relDir\*" -DestinationPath "VakhtovikPlayer-v$version-windows.zip" -Force
          Write-Host "Packed: VakhtovikPlayer-v$version-windows.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: VakhtovikPlayer-windows
          path: client/flutter_app/VakhtovikPlayer-v*-windows.zip
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Сборка под Android (APK)
  # ─────────────────────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/flutter_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze (non-fatal)
        run: flutter analyze --no-fatal-infos || true

      # Подпись APK (опционально, если секреты настроены)
      - name: Setup keystore (if configured)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/vakhtovik.keystore
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=vakhtovik.keystore
          EOF

      - name: Build Android APK (debug, unsigned)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 == '' }}
        run: flutter build apk --release --split-per-abi

      - name: Build Android APK (signed)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        shell: bash
        run: |
          VERSION="0.2.22"
          mkdir -p apk_out
          for f in build/app/outputs/flutter-apk/*.apk; do
            base=$(basename "$f" .apk)
            cp "$f" "apk_out/VakhtovikPlayer-v${VERSION}-${base}.apk"
          done
          ls -la apk_out/

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VakhtovikPlayer-android
          path: client/flutter_app/apk_out/*.apk
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # Создание GitHub Release (только при пуше тега v*)
  # ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: VakhtovikPlayer-windows
          path: release-assets/

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: VakhtovikPlayer-android
          path: release-assets/

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VakhtovikPlayer ${{ github.ref_name }}"
          body: |
            ## VakhtovikPlayer ${{ github.ref_name }}

            ### Платформы
            - **Windows** (x64): исполняемый файл + sing-box VPN
            - **Android**: APK по архитектурам (arm64-v8a, armeabi-v7a, x86_64)

            ### Установка
            **Windows**: распакуй zip, запусти `vakhtovik_player.exe` от имени администратора.
            **Android**: установи нужный APK по архитектуре устройства.

            ### Изменения v0.2.22
            - Улучшен вывод Главной страницы YouTube: показывается имя пользователя, inline-индикатор загрузки
            - Shorts: отдельный специализированный endpoint (MWEB FEshorts + fallback), карточки в формате 9:16 с gradient-оверлеем
            - Подписки: logout только при явной 401/403 ошибке, не при пустом ответе; кнопка входа прямо в теле вкладки
            - InnerTube: retry-логика (2 попытки) и обработка 429 rate-limit
          files: release-assets/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
