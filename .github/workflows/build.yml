name: Build Flutter Apps

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Add Flutter to PATH
        shell: pwsh
        run: |
          # Ищем Flutter в стандартных местах
          $paths = @("C:\flutter", "C:\src\flutter", "C:\tools\flutter", "$env:USERPROFILE\flutter")
          $found = $paths | Where-Object { Test-Path "$_\bin\flutter.bat" } | Select-Object -First 1
          if (-not $found) { Write-Error "Flutter не найден! Укажи путь в переменной FLUTTER_ROOT"; exit 1 }
          Write-Host "Flutter найден: $found"
          echo "$found\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Compress Windows Build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath Vakhtovik-Player-Windows.zip

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: Vakhtovik-Player-Windows.zip
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Flutter SDK (from Google)
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.3-stable.tar.xz
          tar xf flutter_linux_3.24.3-stable.tar.xz
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Vakhtovik-Player-Windows
          path: release-assets/windows

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: Vakhtovik-Player-Android
          path: release-assets/android

      - name: Rename APK
        shell: bash
        run: mv release-assets/android/app-release.apk release-assets/android/Vakhtovik-Player-Android.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Vakhtovik Player v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          body: |
            Автоматическая сборка Плеера Вахтовика.

            v${{ steps.version.outputs.version }}:
            - YouTube «Главная» через InnerTube API
            - IPTV: Беларусь + Россия, кэш-first
            - WebView: исправлены циклические перезагрузки
            - Исправлены YouTube search/feed/popular
          files: |
            release-assets/windows/Vakhtovik-Player-Windows.zip
            release-assets/android/Vakhtovik-Player-Android.apk
